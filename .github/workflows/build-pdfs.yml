name: Build PDFs

# Renders a PDF for every document and uploads them as a downloadable artifact.
# This is the "PDFs as CI artifacts" model: nothing is committed to the repo.
# The build fails if any document cannot be rendered.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-pdfs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install pandoc, xelatex, fonts, and ImageMagick
        run: |
          sudo apt-get update
          # Package set derived by listing every \usepackage in pandoc's
          # xelatex output + our headers and mapping each .sty to its Debian
          # package (kpsewhich/dpkg -S). Notably: lmodern -> lmodern,
          # selnolig -> texlive-luatex, xurl/hyperxmp/upquote -> latex-extra,
          # fancyhdr/graphicx/longtable -> latex-base. fonts-texgyre/-inconsolata
          # supply the mainfont/monofont via fontconfig for xelatex.
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex texlive-luatex \
            texlive-base texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra \
            lmodern fonts-texgyre fonts-inconsolata \
            imagemagick
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Build every document to PDF
        run: python scripts/build_pdfs.py
      - name: Upload PDFs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codecraft-papers-pdfs
          path: build/pdfs/*.pdf
          if-no-files-found: error
