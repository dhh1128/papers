name: check links in markdown files

# Quarterly sweep for broken hyperlinks (external + internal) across the
# published documents, using Lychee with .github/lychee.toml. External
# link-checking is inherently flaky (timeouts / rate limits), so it runs on a
# schedule rather than on every push.

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'   # quarterly: 1st of Jan, Apr, Jul, Oct
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --config .github/lychee.toml --verbose './**/*.md'
          fail: true
