name: check links in markdown files

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

# Least privilege: only reads source to check links.
permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --verbose --exclude '((doi|genderit|archive|dl\.acm)\.org)|nyti.ms|cloudflare.com|congress.gov|bit.ly' './**/*.md'
          fail: true
