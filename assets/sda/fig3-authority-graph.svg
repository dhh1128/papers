<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" width="720" height="470" font-family="Open Sans, sans-serif">
  <rect width="720" height="470" fill="#ffffff"/>

  <!-- title -->
  <text x="360" y="34" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="27" fill="#491705">Authority to act vs. authority to authorize</text>

  <!-- left spectrum axis -->
  <line x1="48" y1="98" x2="48" y2="348" stroke="#765043" stroke-width="1.4"/>
  <polygon points="42,106 54,106 48,92" fill="#765043"/>
  <polygon points="42,340 54,340 48,354" fill="#765043"/>
  <text x="30" y="165" text-anchor="middle" transform="rotate(-90 30 165)" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="16" fill="#765043" letter-spacing="1">AUTHORIZE</text>
  <text x="30" y="300" text-anchor="middle" transform="rotate(-90 30 300)" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="16" fill="#765043" letter-spacing="1">ACT</text>

  <!-- edges (drawn first, behind nodes) -->
  <g fill="none" stroke="#c9b8ab" stroke-width="1.3">
    <path d="M415 112 L230 169"/>
    <path d="M415 112 L415 169"/>
    <path d="M415 112 L600 169"/>
    <path d="M230 213 L165 306"/>
    <path d="M230 213 L290 306"/>
    <path d="M415 213 L415 306"/>
    <path d="M415 213 L540 306"/>
    <path d="M600 213 L665 306"/>
  </g>

  <!-- root -->
  <rect x="340" y="68" width="150" height="44" rx="12" fill="#f4e9df" stroke="#8a6f5c" stroke-width="1.8"/>
  <text x="415" y="96" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="18" fill="#491705">owners / board</text>

  <!-- interior nodes -->
  <rect x="165" y="169" width="130" height="44" rx="12" fill="#f4e9df" stroke="#8a6f5c" stroke-width="1.8"/>
  <text x="230" y="196" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705">executive</text>

  <rect x="535" y="169" width="130" height="44" rx="12" fill="#f4e9df" stroke="#8a6f5c" stroke-width="1.8"/>
  <text x="600" y="196" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705">manager</text>

  <!-- orchestrator: the pure delegator (single accent element) -->
  <rect x="345" y="169" width="140" height="44" rx="12" fill="#e7cdb8" stroke="#914f37" stroke-width="2.4"/>
  <text x="415" y="196" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705">orchestrator</text>
  <text x="415" y="236" text-anchor="middle" font-size="12.5" fill="#914f37">broad keys &#183; empty act surface</text>

  <!-- leaves -->
  <g>
    <rect x="119" y="306" width="92" height="36" rx="10" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.6"/>
    <text x="165" y="329" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="15" fill="#444444">persona</text>
    <rect x="244" y="306" width="92" height="36" rx="10" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.6"/>
    <text x="290" y="329" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="15" fill="#444444">persona</text>
    <rect x="369" y="306" width="92" height="36" rx="10" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.6"/>
    <text x="415" y="329" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="15" fill="#444444">persona</text>
    <rect x="494" y="306" width="92" height="36" rx="10" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.6"/>
    <text x="540" y="329" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="15" fill="#444444">persona</text>
    <rect x="619" y="306" width="92" height="36" rx="10" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.6"/>
    <text x="665" y="329" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="15" fill="#444444">persona</text>
  </g>
  <text x="415" y="360" text-anchor="middle" font-size="12.5" fill="#765043">actors with effectors</text>

  <!-- caption -->
  <text x="360" y="404" text-anchor="middle" font-style="italic" font-size="12.5" fill="#777777">Power at the top is allocative, not executive: authority to authorize concentrates toward the root,</text>
  <text x="360" y="424" text-anchor="middle" font-style="italic" font-size="12.5" fill="#777777">authority to act at the leaves. A pure delegator confers authority it cannot itself exercise &#8212; contain by construction.</text>
</svg>
