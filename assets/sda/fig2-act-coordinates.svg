<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" font-family="Open Sans, sans-serif">
  <rect width="720" height="480" fill="#ffffff"/>

  <!-- title -->
  <text x="360" y="34" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="27" fill="#491705">One act, a vector of coordinates</text>

  <!-- axis captions -->
  <text x="150" y="62" font-family="Open Sans, sans-serif" font-weight="600" font-size="14" fill="#765043">effect &#8594;</text>
  <text x="22" y="224" font-family="Open Sans, sans-serif" font-weight="600" font-size="14" fill="#765043" transform="rotate(-90 22 224)">state-kind &#8595;</text>

  <!-- grid -->
  <g stroke="#c9b8ab" stroke-width="1">
    <line x1="150" y1="86"  x2="650" y2="86"/>
    <line x1="150" y1="132" x2="650" y2="132"/>
    <line x1="150" y1="178" x2="650" y2="178"/>
    <line x1="150" y1="224" x2="650" y2="224"/>
    <line x1="150" y1="270" x2="650" y2="270"/>
    <line x1="150" y1="316" x2="650" y2="316"/>
    <line x1="150" y1="362" x2="650" y2="362"/>
    <line x1="150" y1="86" x2="150" y2="362"/>
    <line x1="250" y1="86" x2="250" y2="362"/>
    <line x1="350" y1="86" x2="350" y2="362"/>
    <line x1="450" y1="86" x2="450" y2="362"/>
    <line x1="550" y1="86" x2="550" y2="362"/>
    <line x1="650" y1="86" x2="650" y2="362"/>
  </g>

  <!-- column headers (effects) -->
  <g font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705" text-anchor="middle">
    <text x="200" y="80">observe</text>
    <text x="300" y="80">create</text>
    <text x="400" y="80">modify</text>
    <text x="500" y="80">preserve</text>
    <text x="600" y="80">destroy</text>
  </g>

  <!-- row labels (state-kinds) -->
  <g font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705" text-anchor="end">
    <text x="140" y="114">information</text>
    <text x="140" y="160">record</text>
    <text x="140" y="206">commitment</text>
    <text x="140" y="252">authority</text>
    <text x="140" y="298">resource</text>
    <text x="140" y="344">relationship</text>
  </g>

  <!-- the composite act (single accent element): create-in-record AND create-in-commitment -->
  <rect x="250" y="132" width="100" height="92" fill="#e7cdb8" stroke="#914f37" stroke-width="2.4"/>
  <line x1="250" y1="178" x2="350" y2="178" stroke="#914f37" stroke-width="1.4" stroke-dasharray="3 3"/>

  <!-- leader from block to callout -->
  <path d="M350 178 C400 178 430 214 470 250" fill="none" stroke="#914f37" stroke-width="1.3"/>

  <!-- callout -->
  <rect x="360" y="256" width="330" height="96" rx="14" fill="#ffffff" stroke="#914f37" stroke-width="1.8"/>
  <text x="376" y="284" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="18" fill="#914f37">&#8220;file a tax return&#8221; &#8212; two coordinates</text>
  <text x="376" y="310" font-size="14" fill="#444444">create-in-<tspan font-weight="600">record</tspan> &#8743; create-in-<tspan font-weight="600">commitment</tspan></text>
  <text x="376" y="334" font-size="14" fill="#444444">gate = the <tspan font-weight="600">join</tspan>: the strictest of the two</text>

  <!-- caption -->
  <text x="360" y="404" text-anchor="middle" font-style="italic" font-size="12.5" fill="#777777">An act is a set of (effect, state-kind) points, not one; its gate is the strictest any coordinate demands</text>
  <text x="360" y="424" text-anchor="middle" font-style="italic" font-size="12.5" fill="#777777">&#8212; here, a record entry that is also a binding commitment, so a human must sign off.</text>
</svg>
