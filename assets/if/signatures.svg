<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 270" width="680" height="270" font-family="Open Sans, sans-serif">
  <rect width="680" height="270" fill="#ffffff"/>

  <defs>
    <!-- one signature, reused identically on every document (the "same hand") -->
    <path id="sig" d="M0,18 C6,2 14,0 18,10 C21,18 26,18 30,8 C33,0 40,-1 44,9 C47,17 52,18 57,9 C61,2 70,2 74,12 C77,20 84,20 92,6 C98,-4 108,1 120,15"
          fill="none" stroke="#914f37" stroke-width="2.2" stroke-linecap="round"/>
  </defs>

  <!-- three documents, each a rounded page -->
  <g>
    <!-- permission slip -->
    <rect x="30" y="40" width="190" height="200" rx="14" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.8"/>
    <text x="125" y="72" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705">school permission slip</text>
    <use href="#sig" x="63" y="108"/>
    <line x1="55" y1="150" x2="195" y2="150" stroke="#c9b8ab" stroke-width="1.1"/>
    <text x="55" y="185" font-size="13.5" fill="#444444">signed as: <tspan font-weight="600">parent</tspan></text>
    <text x="55" y="210" font-size="13.5" fill="#444444">binds: <tspan font-weight="600">Cecilia</tspan></text>
  </g>

  <g>
    <!-- invoice -->
    <rect x="245" y="40" width="190" height="200" rx="14" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.8"/>
    <text x="340" y="72" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705">&#8364;100,000 invoice</text>
    <use href="#sig" x="278" y="108"/>
    <line x1="270" y1="150" x2="410" y2="150" stroke="#c9b8ab" stroke-width="1.1"/>
    <text x="270" y="185" font-size="13.5" fill="#444444">signed as: <tspan font-weight="600">CEO</tspan></text>
    <text x="270" y="210" font-size="13.5" fill="#444444">binds: <tspan font-weight="600">Acme</tspan></text>
  </g>

  <g>
    <!-- lease -->
    <rect x="460" y="40" width="190" height="200" rx="14" fill="#ffffff" stroke="#8a6f5c" stroke-width="1.8"/>
    <text x="555" y="72" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="500" font-size="17" fill="#491705">apartment lease</text>
    <use href="#sig" x="493" y="108"/>
    <line x1="485" y1="150" x2="625" y2="150" stroke="#c9b8ab" stroke-width="1.1"/>
    <text x="485" y="185" font-size="13.5" fill="#444444">signed as: <tspan font-weight="600">tenant</tspan></text>
    <text x="485" y="210" font-size="13.5" fill="#444444">binds: <tspan font-weight="600">Cecilia</tspan></text>
  </g>
</svg>
